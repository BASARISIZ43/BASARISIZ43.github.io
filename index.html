<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#1a1f2e">
<title>KM Takip — Sürücü</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f1420;
    --surface: #1a2035;
    --card: #1e2740;
    --accent: #3d7fff;
    --accent2: #00c896;
    --danger: #ff4d6d;
    --text: #e8eaf0;
    --muted: #6b7a9d;
    --border: #2a3352;
    --input-bg: #111827;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    min-height: -webkit-fill-available;
  }

  .header {
    background: var(--surface);
    padding: 20px 20px 16px;
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    z-index: 10;
  }

  .header-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 4px;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .logo-icon {
    width: 36px; height: 36px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
  }

  .logo h1 { font-size: 17px; font-weight: 700; letter-spacing: -0.3px; }
  .logo span { font-size: 11px; color: var(--muted); }

  .status-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--accent2);
    box-shadow: 0 0 8px var(--accent2);
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  .content { padding: 20px; max-width: 480px; margin: 0 auto; }

  .driver-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 16px;
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .driver-avatar {
    width: 44px; height: 44px;
    background: linear-gradient(135deg, var(--accent), #6c63ff);
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px; flex-shrink: 0;
  }

  .driver-info { flex: 1; }
  .driver-name { font-size: 15px; font-weight: 600; }
  .driver-id { font-size: 12px; color: var(--muted); margin-top: 2px; }

  .change-btn {
    background: var(--border);
    border: none;
    color: var(--muted);
    padding: 6px 12px;
    border-radius: 8px;
    font-size: 12px;
    cursor: pointer;
  }

  /* Name setup */
  .name-setup {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 20px;
    margin-bottom: 16px;
    text-align: center;
  }

  .name-setup h2 { font-size: 16px; margin-bottom: 8px; }
  .name-setup p { font-size: 13px; color: var(--muted); margin-bottom: 16px; }

  /* Form card */
  .form-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 20px;
    margin-bottom: 16px;
  }

  .section-title {
    font-size: 12px;
    font-weight: 700;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 14px;
  }

  .field { margin-bottom: 14px; }

  label {
    display: block;
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 6px;
    font-weight: 500;
  }

  input[type="text"],
  input[type="number"],
  input[type="datetime-local"],
  select {
    width: 100%;
    background: var(--input-bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 14px;
    color: var(--text);
    font-size: 15px;
    -webkit-appearance: none;
    outline: none;
    transition: border-color 0.2s;
  }

  input:focus, select:focus {
    border-color: var(--accent);
  }

  input[type="number"] { font-variant-numeric: tabular-nums; font-weight: 600; }

  .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

  /* KM diff badge */
  .km-diff-card {
    background: linear-gradient(135deg, #0d2a1f, #0a2040);
    border: 1px solid #1a4a30;
    border-radius: 14px;
    padding: 16px;
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .km-diff-icon {
    font-size: 28px;
    line-height: 1;
  }

  .km-diff-label { font-size: 11px; color: var(--muted); margin-bottom: 3px; }
  .km-diff-value {
    font-size: 28px;
    font-weight: 800;
    color: var(--accent2);
    font-variant-numeric: tabular-nums;
    letter-spacing: -1px;
  }
  .km-diff-unit { font-size: 14px; font-weight: 400; color: var(--muted); margin-left: 3px; }

  /* Buttons */
  .btn {
    width: 100%;
    padding: 16px;
    border-radius: 14px;
    border: none;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.2px;
  }

  .btn:active { transform: scale(0.98); }

  .btn-primary {
    background: linear-gradient(135deg, var(--accent), #6c63ff);
    color: #fff;
    box-shadow: 0 4px 20px rgba(61,127,255,0.35);
  }

  .btn-success {
    background: linear-gradient(135deg, var(--accent2), #00a87a);
    color: #fff;
    box-shadow: 0 4px 20px rgba(0,200,150,0.3);
    margin-bottom: 10px;
  }

  .btn-outline {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    font-size: 14px;
    padding: 12px;
  }

  .btn:disabled {
    opacity: 0.4;
    cursor: not-allowed;
    transform: none;
  }

  /* Recent trips */
  .trips-list { display: flex; flex-direction: column; gap: 10px; }

  .trip-item {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .trip-km-badge {
    background: rgba(0,200,150,0.12);
    color: var(--accent2);
    border-radius: 8px;
    padding: 6px 10px;
    font-size: 14px;
    font-weight: 700;
    min-width: 56px;
    text-align: center;
    flex-shrink: 0;
  }

  .trip-details { flex: 1; }
  .trip-name { font-size: 13px; font-weight: 600; margin-bottom: 2px; }
  .trip-meta { font-size: 11px; color: var(--muted); }

  .trip-vehicle {
    font-size: 11px;
    color: var(--accent);
    background: rgba(61,127,255,0.1);
    padding: 3px 7px;
    border-radius: 5px;
  }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: #1a3a28;
    color: var(--accent2);
    border: 1px solid #2a5a40;
    padding: 12px 20px;
    border-radius: 50px;
    font-size: 14px;
    font-weight: 600;
    transition: transform 0.3s ease;
    white-space: nowrap;
    z-index: 100;
  }

  .toast.show { transform: translateX(-50%) translateY(0); }

  /* Tabs */
  .tabs {
    display: grid;
    grid-template-columns: 1fr 1fr;
    background: var(--surface);
    border-radius: 12px;
    padding: 4px;
    margin-bottom: 20px;
    border: 1px solid var(--border);
  }

  .tab {
    padding: 10px;
    text-align: center;
    font-size: 13px;
    font-weight: 600;
    color: var(--muted);
    border-radius: 9px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .tab.active {
    background: var(--card);
    color: var(--text);
  }

  .tab-content { display: none; }
  .tab-content.active { display: block; }

  .empty-state {
    text-align: center;
    padding: 30px;
    color: var(--muted);
    font-size: 14px;
  }
  .empty-state .emoji { font-size: 32px; margin-bottom: 8px; }

  .now-btn {
    background: var(--border);
    border: none;
    color: var(--accent);
    font-size: 11px;
    padding: 3px 8px;
    border-radius: 6px;
    cursor: pointer;
    float: right;
    margin-top: -2px;
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <div class="logo">
      <div class="logo-icon">🚗</div>
      <div>
        <h1>KM Takip</h1>
        <span>Sürücü Paneli</span>
      </div>
    </div>
    <div class="status-dot" id="statusDot"></div>
  </div>
</div>

<div class="content">

  <!-- Driver card -->
  <div id="driverCard" style="display:none" class="driver-card">
    <div class="driver-avatar">👤</div>
    <div class="driver-info">
      <div class="driver-name" id="driverDisplayName">—</div>
      <div class="driver-id" id="driverDisplayId">—</div>
    </div>
    <button class="change-btn" onclick="changeName()">Değiştir</button>
  </div>

  <!-- Name setup -->
  <div id="nameSetup" class="name-setup">
    <h2>👋 Hoş geldiniz</h2>
    <p>Başlamadan önce adınızı girin</p>
    <div class="field">
      <input type="text" id="driverNameInput" placeholder="Adınız Soyadınız" maxlength="40">
    </div>
    <button class="btn btn-primary" onclick="saveName()">Devam Et →</button>
  </div>

  <!-- Tabs -->
  <div class="tabs" id="mainTabs" style="display:none">
    <div class="tab active" onclick="switchTab('entry')">📝 Yeni Giriş</div>
    <div class="tab" onclick="switchTab('history')">📋 Geçmiş</div>
  </div>

  <!-- Entry tab -->
  <div class="tab-content active" id="tab-entry">

    <div class="form-card">
      <div class="section-title">Araç Bilgisi</div>
      <div class="field">
        <label>Plaka / Araç Adı</label>
        <input type="text" id="vehiclePlate" placeholder="34 ABC 123" maxlength="20">
      </div>
    </div>

    <div class="form-card">
      <div class="section-title">Kilometre Bilgileri</div>
      <div class="row2">
        <div class="field">
          <label>Başlangıç KM</label>
          <input type="number" id="kmStart" placeholder="00000" min="0">
        </div>
        <div class="field">
          <label>Bitiş KM</label>
          <input type="number" id="kmEnd" placeholder="00000" min="0">
        </div>
      </div>
    </div>

    <!-- KM diff -->
    <div class="km-diff-card" id="kmDiffCard">
      <div class="km-diff-icon">📏</div>
      <div>
        <div class="km-diff-label">Alınan Mesafe</div>
        <div>
          <span class="km-diff-value" id="kmDiffValue">—</span>
          <span class="km-diff-unit" id="kmDiffUnit"></span>
        </div>
      </div>
    </div>

    <div class="form-card">
      <div class="section-title">Saat Bilgileri</div>
      <div class="field">
        <label>
          Başlangıç Saati
          <button class="now-btn" onclick="setNow('timeStart')">Şimdi</button>
        </label>
        <input type="datetime-local" id="timeStart">
      </div>
      <div class="field">
        <label>
          Bitiş Saati
          <button class="now-btn" onclick="setNow('timeEnd')">Şimdi</button>
        </label>
        <input type="datetime-local" id="timeEnd">
      </div>
    </div>

    <div class="form-card">
      <div class="section-title">Notlar (İsteğe bağlı)</div>
      <div class="field">
        <input type="text" id="tripNote" placeholder="Gidilen yer, amaç vb." maxlength="100">
      </div>
    </div>

    <button class="btn btn-success" id="saveBtn" onclick="saveTrip()">✅ Kaydı Gönder</button>
    <button class="btn btn-outline" onclick="clearForm()">Temizle</button>
  </div>

  <!-- History tab -->
  <div class="tab-content" id="tab-history">
    <div class="trips-list" id="tripsList">
      <div class="empty-state">
        <div class="emoji">📭</div>
        Henüz kayıt yok
      </div>
    </div>
  </div>

</div>

<!-- Toast -->
<div class="toast" id="toast">✓ Kaydedildi</div>

<script>
const SHARED_KEY = 'km_trips_shared';
const DRIVER_KEY = 'km_driver_local';

let driverName = '';
let driverKey = '';

// ── Storage helpers ──────────────────────────────────────
async function getSharedTrips() {
  try {
    const r = await window.storage.get(SHARED_KEY, true);
    return r ? JSON.parse(r.value) : [];
  } catch { return []; }
}

async function saveSharedTrips(trips) {
  await window.storage.set(SHARED_KEY, JSON.stringify(trips), true);
}

async function getDriverLocal() {
  try {
    const r = await window.storage.get(DRIVER_KEY, false);
    return r ? JSON.parse(r.value) : null;
  } catch { return null; }
}

async function saveDriverLocal(data) {
  await window.storage.set(DRIVER_KEY, JSON.stringify(data), false);
}

// ── Init ─────────────────────────────────────────────────
async function init() {
  const d = await getDriverLocal();
  if (d && d.name) {
    setDriver(d.name, d.key);
  }
  setupKmListeners();
  setDefaultTimes();
}

function setDriver(name, key) {
  driverName = name;
  driverKey = key;
  document.getElementById('nameSetup').style.display = 'none';
  document.getElementById('driverCard').style.display = 'flex';
  document.getElementById('mainTabs').style.display = 'grid';
  document.getElementById('driverDisplayName').textContent = name;
  document.getElementById('driverDisplayId').textContent = 'ID: ' + key.slice(0,8).toUpperCase();
  loadHistory();
}

async function saveName() {
  const n = document.getElementById('driverNameInput').value.trim();
  if (!n) { alert('Lütfen adınızı girin'); return; }
  const key = 'driver_' + Date.now() + '_' + Math.random().toString(36).slice(2,6);
  await saveDriverLocal({ name: n, key });
  setDriver(n, key);
}

function changeName() {
  document.getElementById('driverNameInput').value = driverName;
  document.getElementById('nameSetup').style.display = 'block';
  document.getElementById('driverCard').style.display = 'none';
  document.getElementById('mainTabs').style.display = 'none';
}

// ── KM diff ───────────────────────────────────────────────
function setupKmListeners() {
  ['kmStart','kmEnd'].forEach(id => {
    document.getElementById(id).addEventListener('input', updateDiff);
  });
}

function updateDiff() {
  const s = parseFloat(document.getElementById('kmStart').value);
  const e = parseFloat(document.getElementById('kmEnd').value);
  const el = document.getElementById('kmDiffValue');
  const unit = document.getElementById('kmDiffUnit');
  if (!isNaN(s) && !isNaN(e) && e >= s) {
    el.textContent = (e - s).toLocaleString('tr-TR');
    unit.textContent = ' km';
    document.getElementById('kmDiffCard').style.borderColor = '#1a4a30';
  } else if (!isNaN(s) && !isNaN(e) && e < s) {
    el.textContent = '!';
    unit.textContent = ' Bitiş < Başlangıç';
    el.style.color = 'var(--danger)';
  } else {
    el.textContent = '—';
    unit.textContent = '';
    el.style.color = 'var(--accent2)';
  }
}

// ── Times ──────────────────────────────────────────────────
function setDefaultTimes() {
  const now = new Date();
  const local = toLocalISOString(now);
  document.getElementById('timeStart').value = local;
}

function setNow(id) {
  document.getElementById(id).value = toLocalISOString(new Date());
}

function toLocalISOString(date) {
  const offset = date.getTimezoneOffset();
  const local = new Date(date.getTime() - offset * 60000);
  return local.toISOString().slice(0, 16);
}

// ── Save trip ─────────────────────────────────────────────
async function saveTrip() {
  const plate = document.getElementById('vehiclePlate').value.trim();
  const s = document.getElementById('kmStart').value;
  const e = document.getElementById('kmEnd').value;
  const ts = document.getElementById('timeStart').value;
  const te = document.getElementById('timeEnd').value;
  const note = document.getElementById('tripNote').value.trim();

  if (!plate) { alert('Plaka giriniz'); return; }
  if (!s || !e) { alert('KM bilgilerini giriniz'); return; }
  if (parseFloat(e) < parseFloat(s)) { alert('Bitiş KM başlangıçtan küçük olamaz'); return; }
  if (!ts) { alert('Başlangıç saatini giriniz'); return; }

  const btn = document.getElementById('saveBtn');
  btn.disabled = true;
  btn.textContent = '⏳ Kaydediliyor...';

  const trip = {
    id: Date.now().toString(),
    driverName,
    driverKey,
    vehicle: plate,
    kmStart: parseFloat(s),
    kmEnd: parseFloat(e),
    kmDiff: parseFloat(e) - parseFloat(s),
    timeStart: ts,
    timeEnd: te || null,
    note,
    savedAt: new Date().toISOString()
  };

  try {
    const trips = await getSharedTrips();
    trips.unshift(trip);
    await saveSharedTrips(trips);
    showToast('✓ Kaydedildi!');
    clearForm();
    loadHistory();
  } catch(err) {
    alert('Kayıt hatası: ' + err.message);
  }

  btn.disabled = false;
  btn.textContent = '✅ Kaydı Gönder';
}

// ── History ───────────────────────────────────────────────
async function loadHistory() {
  const trips = await getSharedTrips();
  const mine = trips.filter(t => t.driverKey === driverKey);
  const list = document.getElementById('tripsList');

  if (!mine.length) {
    list.innerHTML = '<div class="empty-state"><div class="emoji">📭</div>Henüz kaydınız yok</div>';
    return;
  }

  list.innerHTML = mine.map(t => `
    <div class="trip-item">
      <div class="trip-km-badge">${t.kmDiff} km</div>
      <div class="trip-details">
        <div class="trip-name">${t.vehicle}</div>
        <div class="trip-meta">${formatDT(t.timeStart)} ${t.timeEnd ? '→ ' + formatDT(t.timeEnd) : ''}</div>
        ${t.note ? `<div class="trip-meta" style="color:#8899bb;margin-top:2px">📝 ${t.note}</div>` : ''}
      </div>
    </div>
  `).join('');
}

function formatDT(str) {
  if (!str) return '';
  const d = new Date(str);
  return d.toLocaleDateString('tr-TR', {day:'2-digit',month:'2-digit'}) + ' ' +
         d.toLocaleTimeString('tr-TR', {hour:'2-digit',minute:'2-digit'});
}

// ── Helpers ───────────────────────────────────────────────
function clearForm() {
  document.getElementById('vehiclePlate').value = '';
  document.getElementById('kmStart').value = '';
  document.getElementById('kmEnd').value = '';
  document.getElementById('timeEnd').value = '';
  document.getElementById('tripNote').value = '';
  document.getElementById('kmDiffValue').textContent = '—';
  document.getElementById('kmDiffUnit').textContent = '';
  setDefaultTimes();
}

function switchTab(name) {
  document.querySelectorAll('.tab').forEach((t,i) => {
    t.classList.toggle('active', (i===0 && name==='entry') || (i===1 && name==='history'));
  });
  document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
  if (name === 'history') loadHistory();
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

init();
</script>
</body>
</html>
